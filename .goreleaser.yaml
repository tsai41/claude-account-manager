version: 2

project_name: ccm

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: ccm
    main: ./cmd/ccm
    binary: ccm
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/tsai41/claude-account-manager/internal/cli.Version={{.Version}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: tsai41
    name: claude-account-manager
  draft: false
  prerelease: auto
